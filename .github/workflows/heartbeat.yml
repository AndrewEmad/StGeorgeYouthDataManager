name: Keep WebApi Alive Heartbeat

on:
  schedule:
    - cron: "*/15 * * * *" # Runs every 15 minutes
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  ping-api:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Heartbeat Endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://stgeorge-youth-data.runasp.net/api/Heartbeat)
          if [ "$RESPONSE" -eq 200 ]; then
            echo "Successfully pinged the API. Status code: $RESPONSE"
          else
            echo "Failed to ping the API. Status code: $RESPONSE"
            exit 1
          fi

@if (show) {
  <div class="fab-wrap">
    <button type="button" class="fab install-btn" (click)="install()" aria-label="إضافة للتطبيقات">
      <span class="material-icons">add_to_home_screen</span>
      <span class="fab-label">إضافة للشاشة الرئيسية</span>
    </button>
  </div>
}
@if (showInstructions) {
  <div class="install-instructions-overlay" (click)="showInstructions = false">
    <div class="install-instructions" (click)="$event.stopPropagation()">
      <p>{{ getInstallInstructions() }}</p>
      <button type="button" class="install-instructions-btn" (click)="showInstructions = false">حسناً</button>
    </div>
  </div>
}

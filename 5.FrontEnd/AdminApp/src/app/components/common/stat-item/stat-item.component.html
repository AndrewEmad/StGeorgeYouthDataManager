@if (routerLink()) {
  <a [routerLink]="routerLink()" class="glass-card stat-item stat-item-link" [class]="variant()">
    <span class="material-icons">{{ icon() }}</span>
    <div class="s-info">
      <h3>{{ value() }}</h3>
      <p>{{ label() }}</p>
    </div>
    <ng-content />
  </a>
} @else {
  <div class="glass-card stat-item" [class]="variant()">
    <span class="material-icons">{{ icon() }}</span>
    <div class="s-info">
      <h3>{{ value() }}</h3>
      <p>{{ label() }}</p>
    </div>
    <ng-content />
  </div>
}

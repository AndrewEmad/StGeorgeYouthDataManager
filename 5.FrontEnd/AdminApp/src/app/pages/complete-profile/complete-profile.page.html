<div class="complete-profile-container">
  <app-card class="login-card animate-slide">
    <div class="login-header">
      <span class="material-icons logo-icon">person</span>
      <h1>إكمال الملف الشخصي</h1>
      <p class="text-muted">يرجى تعبئة البيانات المطلوبة للمتابعة</p>
    </div>

    @if (profileLoading()) {
      <div class="loader">جاري التحميل...</div>
    }

    @if (!profileLoading()) {
      <form (ngSubmit)="onSubmit()">
        <app-form-field label="الاسم الكامل">
          <input type="text" [ngModel]="fullName()" (ngModelChange)="fullName.set($event)" name="fullName" class="form-input" placeholder="الاسم الكامل" required />
        </app-form-field>
        <app-form-field label="رقم التليفون">
          <input type="tel" [ngModel]="phone()" (ngModelChange)="phone.set($event)" name="phone" class="form-input" placeholder="رقم التليفون" required />
        </app-form-field>
        <app-form-field label="العنوان">
          <textarea [ngModel]="address()" (ngModelChange)="address.set($event)" name="address" class="form-input form-textarea" placeholder="العنوان" rows="3" required></textarea>
        </app-form-field>
        @if (error()) {
          <div class="error-msg">
            <span class="material-icons">error_outline</span>
            {{ error() }}
          </div>
        }
        <button type="submit" class="btn-primary" [disabled]="loading()">
          @if (!loading()) {
            <span>حفظ والمتابعة</span>
          }
          @if (loading()) {
            <span class="spinner"></span>
          }
        </button>
      </form>
    }
  </app-card>
</div>

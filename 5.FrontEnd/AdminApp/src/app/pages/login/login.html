<div class="login-container">
  <app-card class="login-card animate-slide">
    <div class="login-header">
      <div class="logo">
        <span class="material-icons logo-icon">admin_panel_settings</span>
      </div>
      <h1>مدير افتقاد الشباب</h1>
      <p class="text-muted">نظام إدارة بيانات وخدمة الشباب - الإدارة</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <app-form-field label="اسم المستخدم">
        <input
          type="text"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          name="username"
          class="form-input"
          placeholder="أدخل اسم المستخدم"
          required
        />
      </app-form-field>

      <app-form-field label="كلمة المرور">
        <input
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          class="form-input"
          placeholder="أدخل كلمة المرور"
          required
        />
      </app-form-field>

      @if (error()) {
        <div class="error-msg">
          <span class="material-icons">error_outline</span>
          {{ error() }}
        </div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (!loading()) {
          <span>دخول لوحة الإدارة</span>
        }
        @if (loading()) {
          <span class="spinner"></span>
        }
      </button>
    </form>
  </app-card>
</div>

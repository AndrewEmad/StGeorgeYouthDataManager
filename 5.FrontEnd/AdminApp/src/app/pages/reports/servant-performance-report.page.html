<div class="animate-slide">
  <admin-report-viewer
    title="أداء الخدام ومتابعة المخدومين"
    subtitle="مكالمات وزيارات هذا الأسبوع"
    backLink="/dashboard/reports/servant-follow-up"
    backLabel="العودة للتقارير"
    [columns]="columns"
    [data]="data()"
    [loading]="loading()"
    [totalCount]="totalCount()"
    [page]="page()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="pageSizeOptions"
    [sortBy]="sortBy()"
    [sortDesc]="sortDesc()"
    [emptyMessage]="'لا يوجد خدام'"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (sortChange)="onSortChange($event)"
    (rowClick)="onRowClick($event)"
    [actionsTemplate]="actionsTplRef() ?? null"
  />
  <ng-template #rowActionsTpl let-row>
    <a [routerLink]="['/dashboard/servants', row.servantId]" class="btn-outline sm" (click)="$event.stopPropagation()">تفاصيل</a>
  </ng-template>
</div>

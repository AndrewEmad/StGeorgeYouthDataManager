<div class="animate-slide">
  @if (error()) {
    <p class="error-msg">{{ error() }}</p>
  }
  <admin-report-viewer
    title="توزيع المخدومين حسب المنطقة"
    subtitle="تقرير منفصل"
    backLink="/dashboard/reports/student-distribution"
    backLabel="العودة لتوزيع المخدومين"
    [columns]="columns"
    [data]="data()"
    [loading]="loading()"
    [totalCount]="totalCount()"
    [page]="page()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="pageSizeOptions"
    [sortBy]="sortBy()"
    [sortDesc]="sortDesc()"
    [actionsTemplate]="actionsTplRef() ?? null"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (sortChange)="onSortChange($event)"
  />
  <ng-template #rowActionsTpl let-row>
    <a [routerLink]="['/dashboard/students']" [queryParams]="{ area: row.groupKey }" class="btn-outline sm" (click)="$event.stopPropagation()">عرض المخدومين</a>
  </ng-template>
</div>

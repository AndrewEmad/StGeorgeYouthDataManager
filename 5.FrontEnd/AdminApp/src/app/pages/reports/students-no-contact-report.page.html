<div class="animate-slide">
  @if (error()) {
    <p class="error-msg">{{ error() }}</p>
  }
  <admin-report-viewer
    title="مخدومون بدون تواصل حديث"
    subtitle="تقرير منفصل"
    backLink="/dashboard/reports/servant-follow-up"
    backLabel="العودة لمتابعة الخدام"
    [filterConfig]="filterConfig()"
    [initialFilterModel]="{ days: 14 }"
    [columns]="columns"
    [data]="data()"
    [loading]="loading()"
    [totalCount]="totalCount()"
    [page]="page()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="pageSizeOptions"
    [sortBy]="sortBy()"
    [sortDesc]="sortDesc()"
    [emptyMessage]="'لا يوجد مخدومون بدون تواصل في الفترة المحددة'"
    [actionsTemplate]="actionsTplRef() ?? null"
    (filterChange)="onFilterChange($event)"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (sortChange)="onSortChange($event)"
  />
  <ng-template #rowActionsTpl let-row>
    <a [routerLink]="['/dashboard/students', row.studentId]" class="btn-outline sm" (click)="$event.stopPropagation()">تفاصيل</a>
  </ng-template>
</div>

<div class="complete-profile-container">
  <app-card class="login-card animate-fade">
    <div class="login-header">
      <span class="material-icons logo-icon">person</span>
      <h1>إكمال الملف الشخصي</h1>
      <p class="text-muted">يرجى تعبئة البيانات المطلوبة للمتابعة</p>
    </div>

    @if (profileLoading()) {
      <div class="loader">جاري التحميل...</div>
    }

    @if (!profileLoading()) {
      <form (submit)="onSubmit(); $event.preventDefault()">
        <div class="form-group">
          <label>الاسم الكامل</label>
          <p class="form-readonly">{{ fullName() || '—' }}</p>
        </div>
        <div class="form-group">
          <label>رقم التليفون</label>
          <input type="tel" [value]="phone()" (input)="phone.set($any($event.target).value)" name="phone" class="form-input" placeholder="رقم التليفون" required />
        </div>
        <div class="form-group">
          <label>العنوان</label>
          <textarea [value]="address()" (input)="address.set($any($event.target).value)" name="address" class="form-input form-textarea" placeholder="العنوان" rows="3" required></textarea>
        </div>
        @if (error()) {
          <div class="error-msg">
            <span class="material-icons">error_outline</span>
            {{ error() }}
          </div>
        }
        <button type="submit" class="btn-primary" [disabled]="loading()">
          @if (!loading()) { حفظ والمتابعة }
          @if (loading()) { <span class="spinner"></span> }
        </button>
      </form>
    }
  </app-card>
</div>

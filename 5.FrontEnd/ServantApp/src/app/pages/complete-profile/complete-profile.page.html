<div class="complete-profile-container">
  <app-card class="login-card" [class]="'login-card animate-fade'">
    <div class="login-header">
      <span class="material-icons logo-icon">person</span>
      <h1>إكمال الملف الشخصي</h1>
      <p class="text-muted">يرجى تعبئة البيانات المطلوبة للمتابعة</p>
    </div>

    <div *ngIf="profileLoading" class="loader">جاري التحميل...</div>

    <form *ngIf="!profileLoading" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <p class="form-readonly">{{ fullName || '—' }}</p>
      </div>
      <div class="form-group">
        <label>رقم التليفون</label>
        <input type="tel" [(ngModel)]="phone" name="phone" class="form-input" placeholder="رقم التليفون" required />
      </div>
      <div class="form-group">
        <label>العنوان</label>
        <textarea [(ngModel)]="address" name="address" class="form-input form-textarea" placeholder="العنوان" rows="3" required></textarea>
      </div>
      @if (error) {
        <div class="error-msg">
          <span class="material-icons">error_outline</span>
          {{ error }}
        </div>
      }
      <button type="submit" class="btn-primary" [disabled]="loading">
        @if (!loading) { حفظ والمتابعة }
        @if (loading) { <span class="spinner"></span> }
      </button>
    </form>
  </app-card>
</div>

<div class="profile-wrapper">
  <main class="container">
    <p class="text-muted animate-fade">تعديل البريد الإلكتروني ورقم التليفون وكلمة المرور</p>

    @if (profileLoading()) {
      <app-loader message="جاري التحميل..." />
    }

    @if (!profileLoading() && profile(); as p) {
      <div class="profile-sections">
        <app-card [class]="'profile-section'">
          <h2>البيانات الشخصية</h2>
          <form (submit)="saveProfile(); $event.preventDefault()">
            <div class="form-group">
              <label>الاسم الكامل</label>
              <p class="form-readonly">{{ fullName() || '—' }}</p>
            </div>
            <div class="form-group">
              <label>البريد الإلكتروني</label>
              <input type="email" [value]="email()" (input)="email.set($any($event.target).value)" name="email" class="form-input" />
            </div>
            <div class="form-group">
              <label>رقم التليفون</label>
              <input type="tel" [value]="phone()" (input)="phone.set($any($event.target).value)" name="phone" class="form-input" />
            </div>
            @if (profileError()) {
              <p class="error-msg">{{ profileError() }}</p>
            }
            <button type="submit" class="btn-primary" [disabled]="profileSaving()">
              {{ profileSaving() ? 'جاري الحفظ...' : 'حفظ التعديلات' }}
            </button>
          </form>
        </app-card>

        <app-card [class]="'profile-section'">
          <h2>تغيير كلمة المرور</h2>
          <form (submit)="changePassword(); $event.preventDefault()">
            <div class="form-group">
              <label>كلمة المرور الحالية</label>
              <input type="password" [value]="currentPassword()" (input)="currentPassword.set($any($event.target).value)" name="currentPassword" class="form-input" />
            </div>
            <div class="form-group">
              <label>كلمة المرور الجديدة</label>
              <input type="password" [value]="newPassword()" (input)="newPassword.set($any($event.target).value)" name="newPassword" class="form-input" placeholder="6 أحرف على الأقل" />
            </div>
            <div class="form-group">
              <label>تأكيد كلمة المرور الجديدة</label>
              <input type="password" [value]="confirmPassword()" (input)="confirmPassword.set($any($event.target).value)" name="confirmPassword" class="form-input" />
            </div>
            @if (passwordError()) {
              <p class="error-msg">{{ passwordError() }}</p>
            }
            <button type="submit" class="btn-outline" [disabled]="passwordSaving()">
              {{ passwordSaving() ? 'جاري التغيير...' : 'تغيير كلمة المرور' }}
            </button>
          </form>
        </app-card>
      </div>
    }
  </main>
</div>

<servant-form-field-wrapper
  [label]="label()"
  [controlId]="id()"
  [required]="required()"
  [error]="error()"
  [hint]="hint()"
  [invalid]="!!error()">
  <span class="date-input-wrap" (click)="triggerShowPicker(dateInput)">
    <input
      #dateInput
      [id]="id()"
      [type]="mode()"
      [value]="value()"
      [disabled]="disabled()"
      [attr.aria-invalid]="error() ? 'true' : null"
      [attr.aria-describedby]="error() ? id() + '-error' : (hint() ? id() + '-hint' : null)"
      (input)="onInput($event)"
      (blur)="onBlur()"
      class="form-input" />
  </span>
</servant-form-field-wrapper>

<servant-form-field-wrapper
  [label]="label()"
  [controlId]="id()"
  [required]="required()"
  [error]="error()"
  [hint]="hint()"
  [invalid]="!!error()">
  <input
    type="number"
    [id]="id()"
    [value]="value() ?? ''"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [min]="min() ?? undefined"
    [max]="max() ?? undefined"
    [step]="step()"
    [attr.aria-invalid]="error() ? 'true' : null"
    [attr.aria-describedby]="error() ? id() + '-error' : (hint() ? id() + '-hint' : null)"
    (input)="onInput($event)"
    (blur)="onBlur()"
    class="form-input" />
</servant-form-field-wrapper>
